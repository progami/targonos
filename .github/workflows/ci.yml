name: CI

on:
  pull_request:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      run_self_hosted_live_auth:
        description: Run live hosted auth smoke on the self-hosted macOS runner
        required: false
        default: false
        type: boolean
      hosted_environment:
        description: Hosted environment for live auth smoke
        required: false
        default: dev
        type: choice
        options:
          - dev
          - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-test-self-hosted:
    if: vars.USE_SELF_HOSTED == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.run_self_hosted_live_auth == 'true'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0
          dest: ${{ runner.temp }}/setup-pnpm-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc.ci
        run: |
          cat > "$NPM_CONFIG_USERCONFIG" <<'EOF'
          registry=https://registry.npmjs.org/
          @jsr:registry=https://npm.jsr.io/
          always-auth=false
          EOF
          pnpm install --frozen-lockfile
      - name: Run live hosted auth smoke
        shell: bash
        run: bash scripts/run-hosted-auth-health.sh "${{ github.event.inputs.hosted_environment }}"

  build-test-github-hosted:
    if: github.event_name != 'pull_request' || github.base_ref != 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0
          dest: ${{ runner.temp }}/setup-pnpm-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc.ci
        run: |
          cat > "$NPM_CONFIG_USERCONFIG" <<'EOF'
          registry=https://registry.npmjs.org/
          @jsr:registry=https://npm.jsr.io/
          always-auth=false
          EOF
          pnpm install --frozen-lockfile
      - name: Verify workspace versions are in sync
        run: node scripts/sync-versions.js --check
      - name: Populate dev env files
        run: |
          cp env/shared.dev.ci.env env/shared.local.env
          cp env/shared.dev.ci.env env/shared.dev.env
          cp env/shared.dev.ci.env env/shared.production.env
          cp apps/sso/.env.dev.ci apps/sso/.env.dev
          cp apps/sso/.env.dev.ci apps/sso/.env.local
          cp apps/sso/.env.dev.ci apps/sso/.env.production
          python - <<'PY'
          from pathlib import Path
          env_local = Path('apps/sso/.env.local')
          env_local.write_text(
              env_local.read_text().replace(
                  'PORTAL_APPS_CONFIG=dev.apps.json',
                  'PORTAL_APPS_CONFIG=dev.local.apps.json',
              )
          )
          PY
          cp apps/talos/.env.dev.ci apps/talos/.env.dev
          cp apps/talos/.env.dev.ci apps/talos/.env.local
          cp apps/talos/.env.dev.ci apps/talos/.env.production
          cp apps/xplan/.env.dev.ci apps/xplan/.env.dev
          cp apps/xplan/.env.dev.ci apps/xplan/.env.local
          cp apps/xplan/.env.dev.ci apps/xplan/.env.production
          cp apps/kairos/.env.dev.ci apps/kairos/.env.dev
          cp apps/kairos/.env.dev.ci apps/kairos/.env.local
          cp apps/kairos/.env.dev.ci apps/kairos/.env.production
          cp apps/atlas/.env.dev.ci apps/atlas/.env.dev
          cp apps/atlas/.env.dev.ci apps/atlas/.env.local
          cp apps/atlas/.env.dev.ci apps/atlas/.env.production
          cp apps/plutus/.env.dev.ci apps/plutus/.env.dev
          cp apps/plutus/.env.dev.ci apps/plutus/.env.local
          cp apps/plutus/.env.dev.ci apps/plutus/.env.production
          cp apps/argus/.env.dev.ci apps/argus/.env.dev
          cp apps/argus/.env.dev.ci apps/argus/.env.local
          cp apps/argus/.env.dev.ci apps/argus/.env.production
          cp apps/hermes/.env.dev.ci apps/hermes/.env.dev
          cp apps/hermes/.env.dev.ci apps/hermes/.env.local
          cp apps/hermes/.env.dev.ci apps/hermes/.env.production
          cp apps/website/.env.dev.ci apps/website/.env.dev
          cp apps/website/.env.dev.ci apps/website/.env.local
          cp apps/website/.env.dev.ci apps/website/.env.production
      - name: Verify CI env contracts
        run: node scripts/verify-ci-env-contracts.mjs
      - name: Verify dev environment configuration
        run: bash scripts/verify-dev-env.sh
      - name: Generate Prisma clients (parallel)
        run: |
          pnpm --filter @targon/talos db:generate &
          pnpm --filter @targon/xplan prisma:generate &
          pnpm --filter @targon/kairos prisma:generate &
          pnpm --filter @targon/atlas db:generate &
          wait
      - name: Determine base ref
        id: changes
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
          fi
      - name: Lint changed workspaces
        run: pnpm lint
        env:
          APP_CHANGED_SINCE: ${{ steps.changes.outputs.sha }}
      - name: Type-check changed workspaces
        run: pnpm typecheck
        env:
          APP_CHANGED_SINCE: ${{ steps.changes.outputs.sha }}
      - name: Build changed workspaces
        run: pnpm build
        env:
          APP_CHANGED_SINCE: ${{ steps.changes.outputs.sha }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run changed workspace tests
        run: pnpm test
        env:
          APP_CHANGED_SINCE: ${{ steps.changes.outputs.sha }}
      - name: Run CI contract tests
        run: |
          pnpm run test:auth-topology
          node --test scripts/verify-ci-env-contracts.test.mjs
          node --test scripts/verify-promotion-ready.test.mjs
      - name: Run auth contract tests
        run: |
          pnpm --filter @targon/auth test
          pnpm --filter @targon/sso test:auth-contracts
          pnpm --filter @targon/atlas test:unit
          node --test ecosystem.topology.test.cjs
      - name: Run SSO auth smoke tests
        run: pnpm --filter @targon/sso test:auth-smoke
      - name: Assert portal build/runtime topology
        run: |
          pnpm --filter @targon/sso build
          build_public_url="$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('apps/sso/.next/required-server-files.json','utf8')); const value=data.config?.env?.NEXT_PUBLIC_PORTAL_AUTH_URL; if (typeof value !== 'string' || value.trim() === '') { throw new Error('apps/sso/.next/required-server-files.json is missing config.env.NEXT_PUBLIC_PORTAL_AUTH_URL'); } process.stdout.write(value.trim());")"
          runtime_public_url="$(node -e "const fs=require('fs'); const lines=fs.readFileSync('apps/sso/.env.local','utf8').split(/\\r?\\n/); for (const line of lines) { if (line.startsWith('NEXT_PUBLIC_PORTAL_AUTH_URL=')) { process.stdout.write(line.slice('NEXT_PUBLIC_PORTAL_AUTH_URL='.length).trim()); process.exit(0); } } throw new Error('apps/sso/.env.local is missing NEXT_PUBLIC_PORTAL_AUTH_URL');")"
          EXPECTED_PORTAL_ORIGIN="https://dev-os.targonglobal.com" \
          BUILD_PUBLIC_URL="$build_public_url" \
          RUNTIME_PUBLIC_URL="$runtime_public_url" \
          pnpm run assert:auth-topology

  promotion-ready:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Require promotion PR to come from dev
        shell: bash
        run: |
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "::error::Promotion PRs to main must come from dev."
            exit 1
          fi
      - name: Require the exact dev SHA to have passed push CI
        env:
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PROMOTION_BRANCH: dev
          PROMOTION_WORKFLOW_ID: ci.yml
        run: node scripts/verify-promotion-ready.mjs

  build-test:
    needs:
      - build-test-github-hosted
      - promotion-ready
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate the required CI path succeeded
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" == "main" ]]; then
            if [[ "${{ needs.promotion-ready.result }}" == "success" ]]; then
              echo "The promotion gate completed successfully."
            else
              echo "The promotion gate did not succeed."
              exit 1
            fi
          elif [[ "${{ needs.build-test-github-hosted.result }}" == "success" ]]; then
            echo "The required CI path completed successfully."
          else
            echo "The required CI path did not succeed."
            exit 1
          fi

name: PR Policy

on:
  pull_request:
    branches: [ main ]

jobs:
  require-dev-source:
    # Legacy status name retained because branch protection expects it.
    name: Require PR head to be dev
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          echo "Base: ${{ github.base_ref }}"
          echo "Head: ${{ github.head_ref }}"
          if [[ "${{ github.base_ref }}" != "main" ]]; then
            echo "Not targeting main; skipping."
            exit 0
          fi

          if [[ -z "${{ github.head_ref }}" || "${{ github.head_ref }}" == "main" ]]; then
            echo "::error::Main PRs must come from a non-main branch."
            exit 1
          fi

          echo "✓ PR source policy passed (${{ github.head_ref }} → main)"
